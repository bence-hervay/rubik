<text x="86" y="42" class="title">Outer-layer probability sweep</text>
<text x="86" y="66" class="subtitle">Probabilities are exactly 5%, 10%, ..., 95%. Target untouched-layer rate: 1.8316%.</text>
<text x="86" y="88" class="subtitle">Required k is derived analytically and checked with 16 randomized layer-hit trials per point.</text>
<text x="86" y="98" class="panel-title">Iterations needed to match the blue-method threshold</text>
<text x="86" y="118" class="subtitle">Lower is faster; ties prefer the lower probability because it gives more middle-layer coverage.</text>
